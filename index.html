<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>training log</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <a class="back" href="https://conancchen.github.io/">← back</a>
        <h1>training log</h1>
        <p class="sub">recent runs, rides, and swims</p>
      </header>
      <div class="controls">
        <input type="search" id="search" placeholder="search dates, places…" />
        <div class="pills" id="type-filter">
          <button data-type="all" class="active">all</button>
          <button data-type="run">run</button>
          <button data-type="bike">bike</button>
          <button data-type="swim">swim</button>
          <button data-type="other">other</button>
        </div>
        <label class="range">distance
          <input type="number" id="dist-min" placeholder="min" min="0" step="0.1" />
          <span>–</span>
          <input type="number" id="dist-max" placeholder="max" min="0" step="0.1" />
          <span>mi</span>
        </label>
        <label class="range">time
          <input type="number" id="time-min" placeholder="min" min="0" />
          <span>–</span>
          <input type="number" id="time-max" placeholder="max" min="0" />
          <span>min</span>
        </label>
      </div>
      <div id="grid" class="grid"></div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
