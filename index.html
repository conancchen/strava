<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>training log</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <a class="back" href="https://conancchen.github.io/">← back</a>
        <h1>training log</h1>
        <p class="sub">recent runs, rides, and swims</p>
        <p class="sub">make your own <a class="plain-link" href="https://github.com/conancchen/strava">here</a></p>

      </header>
      <div class="controls">
        <label class="switch">
          <input type="checkbox" id="races-toggle" />
          <span class="switch-track"><span class="switch-thumb"></span></span>
          <span class="switch-label">races only</span>
        </label>
      </div>
      <div id="grid" class="grid"></div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
